name: Validate source

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: TypeScript and Rust checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install pinned pnpm and stable Rust
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Scan source for secrets and private paths
        run: node scripts/security-scan.mjs

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production JavaScript dependencies
        run: pnpm audit --prod --audit-level high

      - name: Check TypeScript
        run: pnpm exec tsc --noEmit

      - name: Build web assets without media sidecars
        run: pnpm exec vite build

      - name: Test Rust core
        working-directory: src-tauri
        env:
          TAURI_CONFIG: '{"bundle":{"externalBin":[]}}'
        run: cargo test --locked -- --test-threads=1
